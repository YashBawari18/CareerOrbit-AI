<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon-3d.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerOrbit AI</title>

  <!--
    Aggressive suppression of every Google Translate UI element.
    This MUST be in <head> so it applies before GTW injects anything.
  -->
  <style>
    /* Kill the top banner that shifts body.top */
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0 !important; position: static !important; }

    /* Kill the floating tooltip */
    #goog-gt-tt, .goog-te-balloon-frame,
    div#goog-gt-tt, .goog-text-highlight { display: none !important; }

    /* Kill the widget gadget itself */
    .goog-te-gadget, .goog-te-gadget-icon { display: none !important; }
    .skiptranslate { display: none !important; }
    iframe.goog-te-banner-frame { display: none !important; }
  </style>
</head>

<body>
  <!-- GTW anchor – must exist but stays invisible -->
  <div id="google_translate_element" style="position:absolute;width:0;height:0;overflow:hidden;visibility:hidden;pointer-events:none;"></div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    /* ── Google Translate Widget boot ──────────────────────────────── */
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'en', autoDisplay: false },
        'google_translate_element'
      );
    }

    /* ── doGTranslate – called by LanguageContext ───────────────────
       Strategy: set the googtrans cookie then reload.
       This is the most reliable cross-browser method and avoids
       any body-shifting banner since we suppress it in <head>.
    ──────────────────────────────────────────────────────────────── */
    function doGTranslate(lang_pair) {
      if (!lang_pair) return;
      var pair = lang_pair.split ? lang_pair.split('|') : lang_pair;
      if (!Array.isArray(pair) || pair.length < 2) return;

      var toLang = pair[1];

      // Clear any existing googtrans cookies first
      var domains = ['', '.' + window.location.hostname, window.location.hostname];
      var paths   = ['/', window.location.pathname];
      domains.forEach(function(d) {
        paths.forEach(function(p) {
          document.cookie = 'googtrans=; expires=Thu,01 Jan 1970 00:00:00 GMT; path=' + p + (d ? '; domain=' + d : '');
        });
      });

      if (toLang === 'en') {
        // English = no translation – just reload with cleared cookies
        window.location.reload();
        return;
      }

      // Set new translation cookie on all relevant permutations
      var expiry = new Date();
      expiry.setFullYear(expiry.getFullYear() + 1);
      var cookieVal = '/en/' + toLang;
      var expires   = '; expires=' + expiry.toUTCString() + '; path=/';
      document.cookie = 'googtrans=' + cookieVal + expires;
      document.cookie = 'googtrans=' + cookieVal + expires + '; domain=' + window.location.hostname;
      document.cookie = 'googtrans=' + cookieVal + expires + '; domain=.' + window.location.hostname;

      // Then reload – GTW picks up the cookie automatically
      window.location.reload();
    }

    /* ── Numeral Localization (123 -> १२३ / ١٢٣) ──────────────────── */
    (function() {
      var maps = {
        'hi': ['०','१','२','३','४','५','६','७','८','९'], // Hindi (Devanagari)
        'mr': ['०','१','२','३','४','५','६','७','८','९'], // Marathi (Devanagari)
        'ar': ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'], // Arabic (Eastern Arabic)
        'ur': ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹']  // Urdu (Perso-Arabic)
      };

      function translateDigits(text, lang) {
        var map = maps[lang];
        if (!map) return text;
        return text.replace(/[0-9]/g, function(d) {
          return map[parseInt(d)];
        });
      }

      function walkAndTranslate(node, lang) {
        if (node.nodeType === Node.TEXT_NODE) {
          var newVal = translateDigits(node.nodeValue, lang);
          if (newVal !== node.nodeValue) {
            node.nodeValue = newVal;
          }
        } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
          // Even if Google Translate skips an element (like .notranslate), 
          // we still want to walk its children to localize numerals.
          for (var i = 0; i < node.childNodes.length; i++) {
            walkAndTranslate(node.childNodes[i], lang);
          }
        }
      }

      var currentLang = localStorage.getItem('co_lang') || 'en';
      if (maps[currentLang]) {
        document.addEventListener('DOMContentLoaded', function() {
          walkAndTranslate(document.body, currentLang);
          
          var observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
              mutation.addedNodes.forEach(function(node) {
                walkAndTranslate(node, currentLang);
              });
              if (mutation.type === 'characterData') {
                var newVal = translateDigits(mutation.target.nodeValue, currentLang);
                if (newVal !== mutation.target.nodeValue) {
                  mutation.target.nodeValue = newVal;
                }
              }
            });
          });

          observer.observe(document.body, { childList: true, subtree: true, characterData: true });
        });
      }
    })();

    /* Re-apply the body fix after GTW injects its banner */
    document.addEventListener('DOMContentLoaded', function() {
      var observer = new MutationObserver(function() {
        document.body.style.top = '0px';
      });
      observer.observe(document.body, { attributes: true, attributeFilter: ['style'] });
    });
  </script>

  <!-- Load GTW async so it doesn't block rendering -->
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
</body>

</html>
