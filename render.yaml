services:
  - type: web
    name: careerorbit-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: careerorbit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: careerorbit-db
    plan: free
    region: singapore
    databaseName: careerorbit
    user: orbit_admin
